blueprint:
  name: TRV stuck open / heating without source
  description: >
    Notify when a room appears to be heating up, based on a temperature derivative
    sensor, while that room's own Wiser heating demand is 0%, central heating is
    active elsewhere, and any optional AC units for that room are off.

    This is intended to detect a potentially stuck-open radiator/TRV: the room is
    getting warmer even though Wiser is not demanding heat for that room.

    The room name is automatically derived from the area assigned to the selected
    temperature derivative sensor. You can override it if needed.
  domain: automation
  author: Ed Jellard
  source_url: https://github.com/ejellard/HomeAssistant

  input:
    temperature_derivative_sensor:
      name: Temperature derivative sensor
      description: >
        Sensor that rises when the room is getting hotter, e.g.
        sensor.marcel_temperature_derivative.
      selector:
        entity:
          filter:
            - domain: sensor

    derivative_threshold:
      name: Derivative threshold
      description: >
        Notify when the derivative sensor is above this value.
      default: 1
      selector:
        number:
          min: 0
          max: 10
          step: 0.1
          mode: box

    room_heating_demand_sensor:
      name: Room heating demand sensor
      description: >
        The Wiser LTS heating demand sensor for this room, e.g.
        sensor.wiser_lts_heating_demand_marcel_s_room.

        This automation only alerts when this sensor is 0. If it is above 0,
        Wiser is demanding heat for the room, so warming is expected.
      selector:
        entity:
          filter:
            - domain: sensor

    whole_house_heating_sensor:
      name: Whole-house heating sensor
      default: sensor.wiser_heating
      description: >
        Sensor showing whether heating is active somewhere in the house, e.g.
        sensor.wiser_heating.
      selector:
        entity:
          filter:
            - domain: sensor

    whole_house_heating_on_state:
      name: Whole-house heating 'on' state
      description: >
        The state of the whole-house heating sensor when heating is on.
      default: "On"
      selector:
        text:

    ac_climate_entities:
      name: Optional AC climate entities
      description: >
        Optional. Select one or more AC climate entities for this room. If selected,
        all must be off for the alert to fire.
      default: []
      selector:
        entity:
          multiple: true
          filter:
            - domain: climate

    room_name_override:
      name: Optional room name override
      description: >
        Optional. Leave blank to use the area assigned to the temperature
        derivative sensor.
      default: ""
      selector:
        text:

    notify_service:
      name: Notify service
      description: >
        Notification service to call, e.g. notify.mobile_app_ed_s26.
      default: notify.mobile_app_ed_s26
      selector:
        text:

    notification_title:
      name: Notification title
      default: Possible stuck-open TRV
      selector:
        text:

    check_interval_minutes:
      name: Periodic check interval
      description: >
        How often to re-check while the derivative may already be high. Lower values
        catch problems faster but run more often.
      default: 5
      selector:
        number:
          min: 1
          max: 30
          step: 1
          mode: slider
          unit_of_measurement: minutes

    cooldown:
      name: Cooldown
      description: >
        How long to wait after notifying before this automation can notify again.
      default:
        hours: 3
        minutes: 0
        seconds: 0
      selector:
        duration:

mode: single

variables:
  derivative_sensor: !input temperature_derivative_sensor
  derivative_threshold_value: !input derivative_threshold
  room_heating_demand_sensor_entity: !input room_heating_demand_sensor
  heating_sensor: !input whole_house_heating_sensor
  heating_on_state: !input whole_house_heating_on_state
  ac_entities: !input ac_climate_entities
  room_name_input: !input room_name_override
  check_interval_minutes_value: !input check_interval_minutes

  room_name: >-
    {% set override = room_name_input | trim %}
    {% if override %}
      {{ override }}
    {% else %}
      {{ area_name(derivative_sensor) }}
    {% endif %}

triggers:
  # Fires when the room first starts warming quickly.
  - trigger: numeric_state
    entity_id: !input temperature_derivative_sensor
    above: !input derivative_threshold

  # Fires when this room's own Wiser heating demand changes.
  - trigger: state
    entity_id: !input room_heating_demand_sensor

  # Fires when the whole-house heating sensor changes.
  - trigger: state
    entity_id: !input whole_house_heating_sensor

  # Fallback check, so it still catches a room that was already warming
  # before the boiler/heating became active.
  - trigger: time_pattern
    minutes: "*"

conditions:
  # Only continue if the periodic trigger interval matches the configured interval.
  # Non-periodic triggers always pass.
  - condition: template
    value_template: >-
      {% set interval = check_interval_minutes_value | int(5) %}
      {% if trigger.platform != 'time_pattern' %}
        true
      {% else %}
        {{ now().minute % interval == 0 }}
      {% endif %}

  # The room is currently warming faster than the configured threshold.
  - condition: template
    value_template: >-
      {{ states(derivative_sensor) | float(0) > derivative_threshold_value | float(0) }}

  # Wiser is not demanding heat for this room.
  # If this is above 0, the room may legitimately be heating.
  - condition: template
    value_template: >-
      {{ states(room_heating_demand_sensor_entity) | float(0) == 0 }}

  # Heating is active somewhere else in the house.
  - condition: template
    value_template: >-
      {{ states(heating_sensor) == heating_on_state }}

  # Optional AC check. If no AC entities are selected, this condition passes.
  # If AC entities are selected, every selected climate entity must be off.
  - condition: template
    value_template: >-
      {% if ac_entities | count == 0 %}
        true
      {% else %}
        {{ expand(ac_entities)
            | rejectattr('state', 'eq', 'off')
            | list
            | count == 0 }}
      {% endif %}

actions:
  - action: !input notify_service
    data:
      title: !input notification_title
      message: >-
        {% set room = room_name | trim %}
        {% if room %}
          {{ room }} is heating for no obvious reason. The room's Wiser heating demand is 0%, but the temperature is still rising.
        {% else %}
          A room is heating for no obvious reason. The room's Wiser heating demand is 0%, but the temperature is still rising.
        {% endif %}

  - delay: !input cooldown
