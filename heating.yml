blueprint:
  name: Room Heating - Boiler vs AC
  description: Automatically control room heating using either boiler or AC based on a binary sensor, unless Wiser Away Mode is active.
  domain: automation

  input:
    target_temperature_entity:
      name: Target Temperature Input
      description: The input_number entity that sets the target temperature for this room
      selector:
        entity:
          domain: input_number
    
    ac_entity:
      name: Air Conditioner Climate Entity
      description: The climate entity for the room's air conditioning unit
      selector:
        entity:
          domain: climate
    
    wiser_entity:
      name: Wiser Heating Climate Entity
      description: The climate entity for the room's Wiser heating system
      selector:
        entity:
          domain: climate
    
    heating_mode_sensor:
      name: Heat with AC Binary Sensor
      description: Binary sensor that determines whether to use AC for heating (on) or boiler (off)
      default: binary_sensor.heatwithairconditioning
      selector:
        entity:
          domain: binary_sensor

    wiser_away_mode_entity:
      name: Wiser Away Mode Switch
      description: Entity indicating Wiser Away Mode (must be OFF for the automation to run)
      default: switch.wiser_away_mode
      selector:
        entity:
          domain: switch

triggers:
  - trigger: state
    entity_id: !input target_temperature_entity
  - trigger: state
    entity_id: !input heating_mode_sensor

conditions:
  # Only run when Wiser Away Mode is OFF
  - condition: state
    entity_id: !input wiser_away_mode_entity
    state: "off"

actions:
  - if:
      - condition: state
        entity_id: !input heating_mode_sensor
        state: "off"
    then:
      # Use Wiser boiler for heating
      - action: climate.set_temperature
        data:
          temperature: "{{ states(target_temperature_entity) | float }}"
        target:
          entity_id: !input wiser_entity
      
      - action: climate.turn_off
        data: {}
        target:
          entity_id: !input ac_entity
    
    else:
      # Use AC for heating mode
      - action: climate.set_temperature
        data:
          temperature: 8
        target:
          entity_id: !input wiser_entity
      
      - if:
          - condition: numeric_state
            entity_id: !input target_temperature_entity
            above: 15
        then:
          # Temperature above 15°C - use AC for heating
          - action: climate.set_temperature
            data:
              temperature: "{{ (states(target_temperature_entity) | float) + 2 }}"
              hvac_mode: heat
            target:
              entity_id: !input ac_entity

          - action: climate.set_preset_mode
            data:
              preset_mode: quiet
            target:
              entity_id: !input ac_entity
        
        else:
          # Target temperature too low – turn off AC
          - action: climate.turn_off
            data: {}
            target:
              entity_id: !input ac_entity

mode: single

variables:
  target_temperature_entity: !input target_temperature_entity
